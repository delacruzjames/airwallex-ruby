name: Release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Merge develop, build, and publish gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release is from develop
        run: |
          target="${{ github.event.release.target_commitish }}"
          if [ "$target" != "develop" ]; then
            echo "Release target must be develop (got: $target)"
            exit 1
          fi

      - name: Merge develop into master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin develop master
          git checkout master
          git merge origin/develop --no-edit -m "Release ${{ github.event.release.tag_name }}"
          git push origin master

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Verify release tag matches gem version
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          gem_version="$(ruby -r ./lib/airwallex/version.rb -e 'puts Airwallex::VERSION')"
          if [ "$version" != "$gem_version" ]; then
            echo "Release tag $tag (version $version) does not match Airwallex::VERSION ($gem_version)"
            exit 1
          fi

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler: "2.6.9"
          bundler-cache: true

      - name: Run test suite
        run: bundle exec rspec

      - name: Build gem
        run: gem build airwallex-ruby.gemspec

      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@v1
        with:
          setup-trusted-publisher: true
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}

      - name: Publish to RubyGems
        run: gem push airwallex-ruby-*.gem

      - name: Attach gem to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: airwallex-ruby-*.gem
