name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (e.g. v0.1.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build and publish gem
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler: "2.6.9"
          bundler-cache: true

      - name: Verify tag matches gem version
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          EXPECTED_VERSION="${TAG#v}"
          ACTUAL_VERSION="$(ruby -r ./lib/airwallex/version -e 'puts Airwallex::VERSION')"

          if [ "$EXPECTED_VERSION" != "$ACTUAL_VERSION" ]; then
            echo "Tag version ($EXPECTED_VERSION) does not match Airwallex::VERSION ($ACTUAL_VERSION)"
            exit 1
          fi

          echo "Release version: $ACTUAL_VERSION"

      - name: Run RuboCop
        run: bundle exec rubocop

      - name: Run RSpec
        run: bundle exec rspec

      - name: Build gem
        run: bundle exec rake build

      - name: Verify built gem filename
        run: |
          VERSION="${{ steps.release.outputs.tag }}"
          VERSION="${VERSION#v}"
          GEM_FILE="pkg/airwallex-ruby-${VERSION}.gem"

          if [ ! -f "$GEM_FILE" ]; then
            echo "Expected gem file not found: $GEM_FILE"
            ls -la pkg/
            exit 1
          fi

          echo "gem_file=$GEM_FILE" >> "$GITHUB_ENV"

      - name: Publish to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: gem push "$gem_file"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          files: pkg/*.gem
