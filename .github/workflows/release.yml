name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (e.g. v0.1.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Merge develop, build, and publish gem
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release is from develop
        if: github.event_name == 'release'
        run: |
          target="${{ github.event.release.target_commitish }}"
          if [ "$target" != "develop" ]; then
            echo "Release target must be develop (got: $target)"
            exit 1
          fi

      - name: Merge develop into master
        if: github.event_name == 'release'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin develop master
          git checkout master
          git merge origin/develop --no-edit -m "Release ${{ steps.release.outputs.tag }}"
          git push origin master

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Verify tag matches gem version
        run: |
          tag="${{ steps.release.outputs.tag }}"
          expected_version="${tag#v}"
          actual_version="$(ruby -r ./lib/airwallex/version -e 'puts Airwallex::VERSION')"

          if [ "$expected_version" != "$actual_version" ]; then
            echo "Tag version ($expected_version) does not match Airwallex::VERSION ($actual_version)"
            exit 1
          fi

          echo "Release version: $actual_version"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler: "2.6.9"
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop

      - name: Run RSpec
        run: bundle exec rspec

      - name: Build gem
        run: bundle exec rake build

      - name: Verify built gem filename
        run: |
          version="${{ steps.release.outputs.tag }}"
          version="${version#v}"
          gem_file="pkg/airwallex-ruby-${version}.gem"

          if [ ! -f "$gem_file" ]; then
            echo "Expected gem file not found: $gem_file"
            ls -la pkg/
            exit 1
          fi

          echo "gem_file=$gem_file" >> "$GITHUB_ENV"

      - name: Publish to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          if [ -z "$GEM_HOST_API_KEY" ]; then
            echo "Error: RUBYGEMS_API_KEY secret is not configured."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          gem push "$gem_file"

      - name: Attach gem to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: pkg/*.gem

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          files: pkg/*.gem
